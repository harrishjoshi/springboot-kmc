# Development-specific configuration
# This file is loaded when spring.profiles.active=dev

# JPA Configuration - Enable SQL logging in development
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Disable cache for dynamic updates during development
springdoc.cache.disabled=true

# Enable detailed logging for debugging in development
logging.level.org.springdoc=DEBUG
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.com.harrish.auth=DEBUG
