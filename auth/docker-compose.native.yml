version: '3.8'

# GraalVM Native Image Configuration
# Run with: docker-compose -f docker-compose.native.yml up -d
# Stop with: docker-compose -f docker-compose.native.yml down

services:
  # PostgreSQL Database Service
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres-native
    restart: unless-stopped
    environment:
      POSTGRES_DB: auth
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_native:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - auth-network-native

  # pgAdmin Service for Database Management
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: auth-pgadmin-native
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data_native:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - auth-network-native

  # Spring Boot Auth Service (GraalVM Native Image)
  auth-service-native:
    build:
      context: .
      dockerfile: Dockerfile.native
    container_name: auth-service-native
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '8'
          memory: 8G
    environment:
      # Database Configuration
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: auth
      DB_USER: postgres
      DB_PASSWORD: password
      # Spring Configuration
      SPRING_PROFILES_ACTIVE: docker
      # JPA Configuration
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_JPA_SHOW_SQL: 'true'
      # JWT Configuration
      JWT_SECRET_KEY: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
      JWT_EXPIRATION: 900000
      JWT_REFRESH_EXPIRATION: 86400000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - auth-network-native

# Named volumes for data persistence
volumes:
  postgres_data_native:
    driver: local
  pgadmin_data_native:
    driver: local

# Network for service communication
networks:
  auth-network-native:
    driver: bridge
